services:

  # ─────────────────────────────────────────
  # MongoDB 7 — основная БД + Vector Search
  # сессии, сообщения, объекты, RAG
  # ─────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: broker_mongo
    restart: unless-stopped
    entrypoint: >
      bash -c "
        openssl rand -base64 756 > /tmp/mongo.key &&
        chmod 400 /tmp/mongo.key &&
        chown 999:999 /tmp/mongo.key &&
        exec docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --keyFile /tmp/mongo.key
      "
    ports:
      - "27019:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-broker}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-broker_db}
    volumes:
      - mongo_data:/data/db
    networks:
      - broker_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # One-shot: initiates the replica set and
  # waits until the node reaches PRIMARY state
  # ─────────────────────────────────────────
  mongo-init:
    image: mongo:7
    container_name: broker_mongo_init
    restart: "no"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - broker_net
    command: >
      mongosh --host mongo:27017
        -u ${MONGO_USER:-broker} -p ${MONGO_PASSWORD}
        --authenticationDatabase admin
        --eval "
          try { rs.status(); }
          catch(e) {
            rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongo:27017'}]});
          }
          var tries = 0;
          while (tries++ < 30) {
            if (rs.status().myState === 1) { print('PRIMARY ready'); break; }
            sleep(1000);
          }
        "

  # ─────────────────────────────────────────
  # Redis — сессии диалогов + pub/sub шина
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: broker_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - broker_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Agent — LangChain.js ядро
  # RAG, инструменты, логика агента
  # ─────────────────────────────────────────
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: broker_agent
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_EMBEDDINGS_MODEL: ${OPENAI_EMBEDDINGS_MODEL:-text-embedding-3-small}
      REDIS_URL: redis://redis:6379
      DB_URL: mongodb://${MONGO_USER:-broker}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB:-broker_db}?authSource=admin&replicaSet=rs0
      REALITY_BACKEND_URL: http://reality-backend:3002
      YANDEX_MAPS_API_KEY: ${YANDEX_MAPS_API_KEY}
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      reality-backend:
        condition: service_healthy
    networks:
      - broker_net


  reality-backend:
    build:
      context: ./reality-backend
      dockerfile: Dockerfile
    container_name: broker_reality-backend
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://reality-backend:3002/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
      
    ports:
      - "${REALITY_BACKEND_PORT}:3002"   # calls WebSocket (VoxImplant)
    environment:
      HTTP_PORT: 3002
      REDIS_URL: redis://redis:6379
      DB_URI: mongodb://${MONGO_USER:-broker}:${MONGO_PASSWORD}@mongo:27017/reality-backend?authSource=admin&replicaSet=rs0
      ENABLE_EXTENDED_ERROR_LOGS: ${ENABLE_EXTENDED_ERROR_LOGS:-0}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - broker_net

  # ─────────────────────────────────────────
  # Gateway — монолит всех обёрток
  # TG бот, юзербот, авито, звонки
  # ─────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: broker_gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_CALLS_PORT}:3002"   # calls WebSocket (VoxImplant)
    environment:
      AGENT_URL: http://agent:3001
      REDIS_URL: redis://redis:6379
      DB_URI: mongodb://${MONGO_USER:-broker}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB:-broker_db}?authSource=admin&replicaSet=rs0
      # Telegram бот
      TG_BOT_TOKEN: ${TG_BOT_TOKEN}
      # Telegram юзербот
      TG_API_ID: ${TG_API_ID}
      TG_API_HASH: ${TG_API_HASH}
      TG_SESSION_STRING: ${TG_SESSION_STRING}
      # Yandex SpeechKit (STT + TTS)
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}
      YANDEX_TTS_VOICE: ${YANDEX_TTS_VOICE:-alena}
      # Calls WebSocket (VoxImplant → gateway)
      CALLS_PORT: ${GATEWAY_CALLS_PORT}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent:
        condition: service_started
    volumes:
      - ./gateway/sessions:/app/sessions  # сессии юзербота
    networks:
      - broker_net

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  mongo_data:
  redis_data:

# ─────────────────────────────────────────
# Network
# ─────────────────────────────────────────
networks:
  broker_net:
    driver: bridge